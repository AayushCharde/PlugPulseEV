services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: plugpulse
      POSTGRES_PASSWORD: plugpulse
      POSTGRES_DB: plugpulse
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Schema (incl. the GIST spatial index) runs automatically on first boot.
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plugpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # cache-only, no persistence
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://plugpulse:plugpulse@db:5432/plugpulse
      REDIS_URL: redis://redis:6379/0
      OCM_API_KEY: ${OCM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
