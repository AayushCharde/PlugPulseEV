# Production self-host stack — free + open, no paid services.
#
# Backend + PostGIS + Redis behind Caddy (automatic HTTPS via Let's Encrypt).
# The SvelteKit frontend is deployed separately on Vercel, so it is
# intentionally NOT in this file.
#
# Usage on your server (a VPS, home box, or a free-forever VM):
#   cp .env.prod.example .env      # then edit — set DOMAIN + POSTGRES_PASSWORD
#   docker compose -f docker-compose.prod.yml up -d --build
#
# DNS: point an A/AAAA record for $DOMAIN at this server BEFORE first boot so
# Caddy can complete the HTTPS certificate challenge.

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plugpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-plugpulse}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Schema (incl. the GIST spatial index) runs automatically on first boot.
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plugpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # No published ports: the database is reachable only on the compose network.

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"] # cache-only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-plugpulse}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-plugpulse}
      REDIS_URL: redis://redis:6379/0
      OCM_API_KEY: ${OCM_API_KEY:-}
      # Browser origins allowed to call the API (your Vercel URL + custom domain).
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      # OIDC (Authentik) — set after creating the provider (see DEPLOYMENT.md).
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # No published ports: Caddy proxies to it over the internal network.

  # --- Authentik: self-hosted OIDC identity provider (own Postgres + Redis) ---
  authentik-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:?set AUTHENTIK_PG_PASS in .env}
      POSTGRES_DB: authentik
    volumes:
      - authentik_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  authentik-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - authentik_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2024.12}
    command: server
    environment: &authentik-env
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY in .env}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    restart: unless-stopped
    # No published ports: Caddy fronts it on the auth subdomain.

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2024.12}
    command: worker
    environment: *authentik-env
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      AUTH_DOMAIN: ${AUTH_DOMAIN:?set AUTH_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persisted certificates — don't lose this volume
      - caddy_config:/config
    depends_on:
      - backend
      - authentik-server
    restart: unless-stopped

volumes:
  db_data:
  authentik_db:
  authentik_redis:
  caddy_data:
  caddy_config:
